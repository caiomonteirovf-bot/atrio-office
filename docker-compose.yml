services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: atrio_office
      POSTGRES_USER: atrio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-AtrioDB2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./server/src/db/migrate_tool_schemas.sql:/docker-entrypoint-initdb.d/03-migrate-tool-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrio -d atrio_office"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://atrio:${DB_PASSWORD:-AtrioDB2026!}@db:5432/atrio_office
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.5}
      GESTHUB_API_URL: ${GESTHUB_API_URL:-https://gesthub-xlvb.onrender.com}
      PORT: 3010
      OPENCLAW_GATEWAY: http://172.18.0.1:18789
      NODE_ENV: production
      CORS_ORIGIN: "*"
      XAI_API_KEY: ${XAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}

volumes:
  pgdata:
