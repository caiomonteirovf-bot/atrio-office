name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — unit tests + lint syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests (vitest)
        run: npm test -- --reporter=verbose

      - name: Syntax check de todos os .js
        run: |
          find src -name "*.js" -print0 | xargs -0 -n1 node --check

  client:
    name: Client — build Vite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Bundle size check
        run: |
          JS_KB=$(du -k dist/assets/*.js | head -1 | awk '{print $1}')
          echo "Bundle JS: ${JS_KB} KB"
          if [ "$JS_KB" -gt 800 ]; then
            echo "::warning::Bundle maior que 800KB — considerar code-splitting"
          fi

  summary:
    name: Status
    runs-on: ubuntu-latest
    needs: [server, client]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Server: ${{ needs.server.result }}"
          echo "Client: ${{ needs.client.result }}"
          if [ "${{ needs.server.result }}" != "success" ] || [ "${{ needs.client.result }}" != "success" ]; then
            exit 1
          fi
