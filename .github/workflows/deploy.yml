name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/atrio/atrio-office
            git pull origin main
            cd /opt/atrio
            docker compose up -d --build atrio-office
            echo "Deploy atrio-office concluido"
