services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: atrio_office
      POSTGRES_USER: atrio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-AtrioDB2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./server/src/db/migrate_tool_schemas.sql:/docker-entrypoint-initdb.d/03-migrate-tool-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atrio -d atrio_office"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      # WARNING: NAO REMOVER nenhuma das 3 redes abaixo.
      # 'default': server <-> db (rede privada do compose)
      # 'gesthub' / 'atrio_finance': FDWs (gesthub_srv, banking_srv) precisam
      #   resolver os hostnames gesthub-db e atrio-db-1 dos sistemas vizinhos.
      # Historico (07/05/2026): sem essas redes, telas Datalake/Ecossistema/Growth
      #   ficam pretas após recriar o container do db. Aconteceu 3x no mesmo dia.
      # Ver: RUNBOOK.md > "Tela preta em Datalake / Ecossistema / Growth"
      - default
      - atrio_finance
      - gesthub

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true  # Docker tini PID 1 — reapeia zumbis do Chromium automaticamente
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://atrio:${DB_PASSWORD:-AtrioDB2026!}@db:5432/atrio_office
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.5}
      GESTHUB_API_URL: ${GESTHUB_API_URL:-http://31.97.175.200}
      GESTHUB_JWT_SECRET: ${GESTHUB_JWT_SECRET}
      PORT: 3010
      OPENCLAW_GATEWAY: http://172.18.0.1:18789
      NFSE_SYSTEM_URL: ${NFSE_SYSTEM_URL:-http://31.97.175.200:3020}
      NODE_ENV: production
      CORS_ORIGIN: "*"
      XAI_API_KEY: ${XAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@atrio.local}
      SLA_TOLERANCE_SECONDS: ${SLA_TOLERANCE_SECONDS:-600}
      REFLECTION_ENABLED: ${REFLECTION_ENABLED:-true}
      ATRIO_FINANCE_URL: ${ATRIO_FINANCE_URL:-http://atrio-banking-system-1:3000}
    volumes:
      - ./client/dist:/app/client/dist:ro
      - ./server/src:/app/src:ro
      - ./server/agents:/app/agents:ro
      - ./server/skills:/app/skills:ro
      - ingest_storage:/app/storage/ingest
      # WARNING: NAO REMOVER. Sem este bind-mount, anexos somem em todo rebuild.
      # Historico (08/05/2026): perdemos 70+ PDFs porque storage estava no FS efemero
      # do container. Cada 'docker compose build' apagava tudo.
      # Ver: RUNBOOK.md > "Anexos sumindo apos rebuild"
      - ./server/whatsapp-attachments:/app/storage/whatsapp-attachments
      - ./server/whatsapp-session:/app/whatsapp-session
    networks:
      - default
      - atrio_finance
      - gesthub

volumes:
  pgdata:
  ingest_storage:

networks:
  atrio_finance:
    external: true
    name: atrio_default
  gesthub:
    external: true
    name: gesthub_default
